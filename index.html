<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>のあ家計簿</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#3A5635">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="のあ家計簿">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --ink:#1e1a14;--ink2:#5a4e3a;--ink3:#a89880;
      --bg:#fdf8f2;--surface:#fff;--surface2:#faf3eb;
      --accent:#3A5635;--accent2:#5a8a53;--accent3:#ddeedd;
      --amber:#D57B0E;--amber2:#F4E2D0;--amber3:#f9ede0;
      --nori:#3A5635;--nori2:#e8f0e7;
      --ayo:#D57B0E;--ayo2:#F4E2D0;
      --red:#b84d0a;--border:rgba(0,0,0,0.08);
      --tate:#8B4513;--tate2:#fdf0e8;
    }
    @media(prefers-color-scheme:dark){:root{
      --ink:#f5ede0;--ink2:#c4a882;--ink3:#7a6850;
      --bg:#1a1510;--surface:#251e15;--surface2:#2e2518;
      --accent:#5a8a53;--accent2:#74a86d;--accent3:#1e3320;
      --amber:#e89020;--amber2:#3a2a10;--amber3:#2e2010;
      --nori:#5a8a53;--nori2:#1a2a18;
      --ayo:#e89020;--ayo2:#3a2a10;
      --red:#e0652a;--border:rgba(255,255,255,0.08);
      --tate:#c47840;--tate2:#2a1a08;
    }}
    body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--ink);font-size:14px}
    .tabs{display:flex;border-bottom:2px solid var(--amber2);background:var(--surface);padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:0;z-index:10}
    .tab{padding:12px 14px;cursor:pointer;font-family:'Syne',sans-serif;font-size:12px;font-weight:500;color:var(--ink3);border-bottom:2px solid transparent;margin-bottom:-2px;background:none;border-top:none;border-left:none;border-right:none;transition:all .2s;white-space:nowrap}
    .tab.active{color:var(--accent);border-bottom-color:var(--accent)}
    .page{display:none;padding:14px}.page.active{display:block}
    .month-bar{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-bottom:14px}
    .month-bar-left{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
    .month-tab{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;font-size:12px;color:var(--ink2);font-family:'Syne',sans-serif;font-weight:500;transition:all .15s;white-space:nowrap}
    .month-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .month-input{padding:6px 8px;border:1px solid var(--border);border-radius:8px;font-size:12px;background:var(--surface2);color:var(--ink);font-family:'DM Sans',sans-serif;outline:none;width:fit-content;min-width:0}
    .month-input:focus{border-color:var(--amber)}
    .search-btn{padding:6px 12px;background:var(--surface2);color:var(--ink2);border:1px solid var(--border);border-radius:8px;font-size:12px;cursor:pointer;font-family:'Syne',sans-serif;font-weight:500;white-space:nowrap;transition:all .15s}
    .search-btn:hover{border-color:var(--amber);color:var(--amber)}
    .record-btn{padding:12px 22px;background:var(--amber);color:#fff;border:none;border-radius:12px;font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;white-space:nowrap;display:flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 2px 8px rgba(213,123,14,.3);transition:opacity .15s}
    .record-btn:hover{opacity:.88}
    @media(max-width:520px){.record-btn{width:100%;margin-top:2px}.month-bar-left{flex:1}}
    @media(min-width:521px){.record-btn{margin-left:auto;flex-shrink:0}}
    .record-inline{display:grid;grid-template-rows:0fr;background:var(--surface);border:0px solid var(--amber2);border-radius:12px;margin-bottom:0;overflow:hidden;transition:grid-template-rows .35s ease,padding .35s ease,margin .35s ease,border-width .35s ease}
    .record-inline>.record-inner{overflow:hidden;padding:0 16px}
    .record-inline.open{grid-template-rows:1fr;border-width:1px;margin-bottom:14px}
    .record-inline.open>.record-inner{padding:16px}
    .kpi-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
    @media(max-width:420px){.kpi-grid{grid-template-columns:1fr 1fr}.kpi-grid .kpi:first-child{grid-column:1/-1}}
    .kpi{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px 14px}
    .kpi-label{font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .kpi-value{font-family:'Syne',sans-serif;font-size:18px;font-weight:700}
    .kpi-diff{font-size:10px;margin-top:2px;font-weight:500}
    .kpi-sub{font-size:10px;margin-top:3px;color:var(--ink3)}
    .settle-banner{border-radius:12px;padding:13px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:10px}
    .settle-banner.even{background:var(--accent3);border:1px solid var(--accent2)}
    .settle-banner.nori-pays{background:var(--nori2);border:1px solid var(--nori)}
    .settle-banner.ayo-pays{background:var(--ayo2);border:1px solid var(--ayo)}
    .settle-text{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
    .settle-amt{font-family:'Syne',sans-serif;font-size:20px;font-weight:700;white-space:nowrap}
    .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
    @media(max-width:480px){.charts-row{grid-template-columns:1fr}}
    .chart-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:13px}
    .chart-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:500;color:var(--ink2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}
    .section-title{font-family:'Syne',sans-serif;font-size:11px;font-weight:500;color:var(--ink2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em}
    .tx-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .tx-item{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-bottom:1px solid var(--border);transition:background .15s}
    .tx-item:last-child{border-bottom:none}
    .tx-item:hover{background:var(--surface2)}
    .tx-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
    .tx-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
    .tx-info{min-width:0}
    .tx-name{font-weight:500;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tx-meta{font-size:10px;color:var(--ink3);margin-top:1px}
    .tx-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .tx-amount{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--red)}
    .who-badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:500}
    .auto-badge{display:inline-block;padding:1px 5px;border-radius:6px;font-size:9px;background:var(--surface2);color:var(--ink3);margin-left:3px}
    .tate-badge{display:inline-block;padding:1px 6px;border-radius:6px;font-size:9px;font-weight:500;margin-left:3px;background:var(--tate2);color:var(--tate)}
    .tx-actions{display:flex;gap:3px}
    .act-btn{background:none;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:11px;padding:3px 7px;color:var(--ink2);transition:all .15s;font-family:'DM Sans',sans-serif}
    .act-btn.edit:hover{border-color:var(--accent2);color:var(--accent);background:var(--accent3)}
    .act-btn.del:hover{border-color:var(--red);color:var(--red);background:#fde8e8}
    .form-row{margin-bottom:12px}
    .form-label{display:block;font-size:10px;color:var(--ink2);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
    .form-input{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:var(--surface2);color:var(--ink);font-family:'DM Sans',sans-serif;outline:none;transition:border .2s}
    .form-input:focus{border-color:var(--amber)}
    .form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
    .who-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
    .who-btn{padding:10px;border:2px solid var(--border);border-radius:10px;background:var(--surface2);cursor:pointer;text-align:center;transition:all .18s}
    .who-btn .who-name{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;margin-top:3px}
    .who-btn.nori-sel{background:var(--nori2);border-color:var(--nori)}
    .who-btn.nori-sel .who-name{color:var(--nori)}
    .who-btn.ayo-sel{background:var(--ayo2);border-color:var(--ayo)}
    .who-btn.ayo-sel .who-name{color:var(--ayo)}
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
    .cat-btn{padding:8px 4px;border:1px solid var(--border);border-radius:8px;background:var(--surface2);cursor:pointer;font-size:11px;color:var(--ink2);text-align:center;transition:all .15s;line-height:1.4}
    .cat-btn.selected{background:var(--amber3);border-color:var(--amber);color:var(--amber)}
    .tate-toggle{display:flex;align-items:center;gap:10px;padding:11px 13px;background:var(--surface2);border-radius:10px;cursor:pointer;border:2px solid var(--border);transition:all .2s;width:100%}
    .tate-toggle.on{background:var(--tate2);border-color:var(--tate)}
    .tate-toggle-indicator{width:36px;height:20px;border-radius:10px;background:var(--ink3);position:relative;transition:all .2s;flex-shrink:0;opacity:.4}
    .tate-toggle-indicator::after{content:'';position:absolute;left:2px;top:2px;width:16px;height:16px;border-radius:50%;background:#fff;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .tate-toggle.on .tate-toggle-indicator{background:var(--tate);opacity:1}
    .tate-toggle.on .tate-toggle-indicator::after{left:18px}
    .tate-toggle-text{flex:1}
    .tate-toggle-label{font-size:13px;font-weight:500;color:var(--ink)}
    .tate-toggle.on .tate-toggle-label{color:var(--tate)}
    .tate-toggle-sub{font-size:10px;color:var(--ink3);margin-top:1px}
    .submit-btn{width:100%;padding:11px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer;margin-top:4px}
    .submit-btn:hover{opacity:.85}
    .success-msg{display:none;background:var(--accent3);color:var(--accent);border-radius:8px;padding:8px 12px;font-size:12px;margin-top:9px;text-align:center;font-weight:500}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;align-items:center;justify-content:center;padding:16px}
    .modal-overlay.open{display:flex}
    .modal{background:var(--surface);border-radius:16px;padding:20px;width:100%;max-width:400px;max-height:85vh;overflow-y:auto}
    .modal-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:-20px;background:var(--surface);padding:4px 0;z-index:1}
    .modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:var(--ink3);padding:0 4px}
    .modal-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:6px}
    .btn-save{padding:10px;background:var(--accent);color:#fff;border:none;border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
    .btn-save:hover{opacity:.85}
    .btn-cancel{padding:10px;background:var(--surface2);color:var(--ink2);border:1px solid var(--border);border-radius:9px;font-family:'Syne',sans-serif;font-size:13px;font-weight:500;cursor:pointer}
    .sub-list{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px}
    .sub-item{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-bottom:1px solid var(--border);transition:background .15s}
    .sub-item:last-child{border-bottom:none}
    .sub-item:hover{background:var(--surface2)}
    .sub-left{display:flex;align-items:center;gap:9px;flex:1;min-width:0}
    .sub-icon-box{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;background:var(--surface2);flex-shrink:0}
    .sub-name{font-weight:500;font-size:13px}
    .sub-meta{font-size:10px;color:var(--ink3);margin-top:1px}
    .sub-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
    .sub-amount{font-family:'Syne',sans-serif;font-size:13px;font-weight:700;color:var(--red);white-space:nowrap}
    .add-sub-btn{width:100%;padding:10px;background:var(--surface2);border:1px dashed var(--border);border-radius:10px;color:var(--ink2);font-family:'Syne',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;margin-bottom:14px}
    .add-sub-btn:hover{border-color:var(--amber);color:var(--amber)}
    .sub-form{background:var(--surface);border:1px solid var(--amber);border-radius:12px;padding:16px;margin-bottom:14px;display:none}
    .sub-form.open{display:block}
    .sub-day-note{font-size:10px;color:var(--ink3);margin-top:4px}
    .del-btn{background:none;border:none;color:var(--ink3);cursor:pointer;font-size:12px;padding:3px 5px}
    .del-btn:hover{color:var(--red)}
    .seisan-block{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;transition:opacity .3s}
    .seisan-block.done{opacity:.45}
    .seisan-summary{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;border-bottom:1px solid var(--border);gap:8px}
    .seisan-who{font-family:'Syne',sans-serif;font-size:14px;font-weight:700}
    .seisan-row{display:flex;justify-content:space-between;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border);font-size:12px;gap:8px}
    .seisan-row:last-child{border-bottom:none}
    .seisan-row-label{color:var(--ink2)}
    .seisan-row-val{font-weight:500;font-family:'Syne',sans-serif;font-size:12px;text-align:right}
    .seisan-done-btn{margin:12px 16px 14px;width:calc(100% - 32px);padding:10px;border:none;border-radius:9px;background:var(--accent);color:#fff;font-family:'Syne',sans-serif;font-size:13px;font-weight:700;cursor:pointer}
    .seisan-done-btn:hover{opacity:.85}
    .seisan-done-btn:disabled{background:var(--ink3);cursor:default;opacity:1}
    .done-stamp{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--surface2);color:var(--ink3);border:1px solid var(--border);white-space:nowrap}
    .seisan-undo-btn{margin:0 16px 14px;padding:8px 16px;border:1px solid var(--border);border-radius:9px;background:none;color:var(--ink2);font-family:'Syne',sans-serif;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
    .seisan-undo-btn:hover{border-color:var(--red);color:var(--red)}
    .filter-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
    .filter-btn{padding:5px 12px;border:1px solid var(--border);border-radius:20px;background:var(--surface);cursor:pointer;font-size:11px;color:var(--ink2);transition:all .15s}
    .filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
    .hist-table{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden}
    .hist-row{display:grid;grid-template-columns:1fr 52px 52px 68px;align-items:center;padding:9px 13px;border-bottom:1px solid var(--border);font-size:11px;gap:4px}
    .hist-row:last-child{border-bottom:none}
    .hist-header{background:var(--surface2);font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;font-weight:500}
    .badge{display:inline-block;padding:1px 6px;border-radius:10px;font-size:9px;font-weight:500}
    /* 同期インジケーター */
    .sync-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink3);padding:6px 14px;background:var(--surface);border-bottom:1px solid var(--border)}
    .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--ink3);flex-shrink:0}
    .sync-dot.online{background:#22c55e;animation:pulse 2s infinite}
    .sync-dot.saving{background:var(--amber);animation:pulse .5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    /* ローディング */
    .loading-overlay{display:flex;position:fixed;inset:0;background:var(--bg);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:12px}
    .loading-overlay.hidden{display:none}
    .loading-spinner{width:36px;height:36px;border:3px solid var(--amber2);border-top-color:var(--amber);border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;color:var(--amber)}
    /* CSV ボタン */
    .csv-btn{padding:8px 16px;background:var(--surface2);color:var(--ink2);border:1px solid var(--border);border-radius:8px;font-family:'Syne',sans-serif;font-size:12px;font-weight:500;cursor:pointer;margin-bottom:12px;transition:all .15s}
    .csv-btn:hover{border-color:var(--accent);color:var(--accent)}
  </style>
</head>
<body>

<!-- ローディング -->
<div class="loading-overlay" id="loading-overlay">
  <div class="loading-spinner"></div>
  <div class="loading-text">データを読み込み中...</div>
</div>

<!-- 支出編集モーダル -->
<div class="modal-overlay" id="edit-modal" onclick="closeModalOutside(event,'edit-modal')">
  <div class="modal">
    <div class="modal-title">支出を編集<button class="modal-close" onclick="closeModal('edit-modal')">✕</button></div>
    <div class="form-row"><label class="form-label">支払った人</label>
      <div class="who-grid">
        <button class="who-btn" id="m-btn-nori" onclick="mSelectWho('nori')"><div style="font-size:18px">🧑</div><div class="who-name">のり</div></button>
        <button class="who-btn" id="m-btn-ayo" onclick="mSelectWho('ayo')"><div style="font-size:18px">👩</div><div class="who-name">あよ</div></button>
      </div>
    </div>
    <div class="form-row"><label class="form-label">金額（円）</label><input class="form-input" type="number" id="m-amount" min="0"></div>
    <div class="form-row"><label class="form-label">説明</label><input class="form-input" type="text" id="m-desc"></div>
    <div class="form-row"><label class="form-label">日付</label><input class="form-input" type="date" id="m-date"></div>
    <div class="form-row"><label class="form-label">カテゴリ</label><div class="cat-grid" id="m-cat-grid"></div></div>
    <div class="form-row">
      <button class="tate-toggle" id="m-tate-toggle" onclick="mToggleTate()">
        <div class="tate-toggle-indicator"></div>
        <div class="tate-toggle-text"><div class="tate-toggle-label">相手の分を立替えた</div><div class="tate-toggle-sub" id="m-tate-sub">オフ = 通常の半々割り勘</div></div>
      </button>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal('edit-modal')">キャンセル</button>
      <button class="btn-save" onclick="saveEdit()">保存する</button>
    </div>
  </div>
</div>

<!-- サブスク編集モーダル -->
<div class="modal-overlay" id="sub-edit-modal" onclick="closeModalOutside(event,'sub-edit-modal')">
  <div class="modal">
    <div class="modal-title">サブスクを編集<button class="modal-close" onclick="closeModal('sub-edit-modal')">✕</button></div>
    <div class="form-row"><label class="form-label">サービス名</label><input class="form-input" type="text" id="se-name"></div>
    <div class="form-row-2">
      <div><label class="form-label">金額（円）</label><input class="form-input" type="number" id="se-amount" min="0"></div>
      <div><label class="form-label">引き落とし日</label><input class="form-input" type="number" id="se-day" min="1" max="31"><div class="sub-day-note">毎月この日に計上</div></div>
    </div>
    <div class="form-row"><label class="form-label">開始月（これより前は計上しない）</label><input class="form-input" type="month" id="se-start-ym"></div>
    <div class="form-row"><label class="form-label">支払った人</label>
      <div class="who-grid">
        <button class="who-btn" id="se-btn-nori" onclick="seSelectWho('nori')"><div style="font-size:18px">🧑</div><div class="who-name">のり</div></button>
        <button class="who-btn" id="se-btn-ayo" onclick="seSelectWho('ayo')"><div style="font-size:18px">👩</div><div class="who-name">あよ</div></button>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import { getFirestore, collection, doc, onSnapshot, addDoc, updateDoc, deleteDoc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
  import { Chart, registerables } from 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/+esm';
  Chart.register(...registerables);

  const firebaseConfig = {
    apiKey: "AIzaSyB0n4-C8kYNeBZxI0oPRWEMMcbSuFi_MB8",
    authDomain: "nori-ayo-kakei.firebaseapp.com",
    projectId: "nori-ayo-kakei",
    storageBucket: "nori-ayo-kakei.firebasestorage.app",
    messagingSenderId: "841975508362",
    appId: "1:841975508362:web:c017b9acd5699d2e84ac73"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const CATS = [
    {name:'固定費',icon:'🏠',color:'#3A5635'},
    {name:'食費',icon:'🍜',color:'#5a8a53'},
    {name:'生活費',icon:'🛒',color:'#D57B0E'},
    {name:'交際・娯楽',icon:'🎉',color:'#c06010'},
    {name:'特別費',icon:'⭐',color:'#8B4513'},
    {name:'その他',icon:'📦',color:'#a89880'},
  ];

  const now = new Date();
  const thisYM = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const lastDate = new Date(now.getFullYear(), now.getMonth()-1, 1);
  const lastYM = `${lastDate.getFullYear()}-${String(lastDate.getMonth()+1).padStart(2,'0')}`;

  let expenses = [];
  let subs = [];
  let seisanDone = {};
  let selWho='nori', selCat='食費', isTate=false;
  let subWho='nori', subCat='固定費', sfIsTate=false;
  let mWho='nori', mCat='食費', mIsTate=false;
  let seWho='nori', seCat='固定費', seIsTate=false, editingSubId=null;
  let editingId=null, activeFilter='すべて', dashMonth=thisYM;
  let catChart, whoChart;

  const fmt = n => '¥'+Math.round(n).toLocaleString('ja-JP');
  const catObj = n => CATS.find(c=>c.name===n)||CATS[CATS.length-1];

  // 同期状態表示
  function setSyncStatus(status) {
    const dot = document.getElementById('sync-dot');
    const text = document.getElementById('sync-text');
    if(status==='online'){dot.className='sync-dot online';text.textContent='同期済み';}
    else if(status==='saving'){dot.className='sync-dot saving';text.textContent='保存中...';}
    else{dot.className='sync-dot';text.textContent='接続中...';}
  }

  // Firestore リアルタイム同期
  onSnapshot(collection(db,'expenses'), snap => {
    expenses = snap.docs.map(d=>({id:d.id,...d.data()}));
    setSyncStatus('online');
    document.getElementById('loading-overlay').classList.add('hidden');
    renderDashboard();
  });
  onSnapshot(collection(db,'subs'), snap => {
    subs = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderSubs();
  });
  onSnapshot(doc(db,'meta','seisanDone'), snap => {
    if(snap.exists()) seisanDone = snap.data();
    renderSeisan();
  });

  // 支出追加
  async function addExpense() {
    const amt = parseFloat(document.getElementById('f-amount').value);
    const desc = document.getElementById('f-desc').value.trim();
    const date = document.getElementById('f-date').value;
    if(!amt||!desc||!date){alert('金額・説明・日付を入力してください');return;}
    setSyncStatus('saving');
    await addDoc(collection(db,'expenses'),{amount:amt,desc,cat:selCat,date,who:selWho,tate:isTate,auto:false,createdAt:Date.now()});
    document.getElementById('f-amount').value='';
    document.getElementById('f-desc').value='';
    isTate=false;
    document.getElementById('tate-toggle').classList.remove('on');
    document.getElementById('tate-sub').textContent='オフ = 通常の半々割り勘';
    document.getElementById('record-inline').classList.remove('open');
    const msg=document.getElementById('success-msg');msg.style.display='block';setTimeout(()=>msg.style.display='none',2000);
  }

  async function deleteExpense(id) {
    if(!confirm('この支出を削除しますか？'))return;
    setSyncStatus('saving');
    await deleteDoc(doc(db,'expenses',id));
  }

  async function saveEdit() {
    const amt=parseFloat(document.getElementById('m-amount').value);
    const desc=document.getElementById('m-desc').value.trim();
    const date=document.getElementById('m-date').value;
    if(!amt||!desc||!date){alert('金額・説明・日付を入力してください');return;}
    setSyncStatus('saving');
    await updateDoc(doc(db,'expenses',editingId),{amount:amt,desc,date,who:mWho,tate:mIsTate,cat:mCat});
    closeModal('edit-modal');
  }

  async function addSub() {
    const name=document.getElementById('sf-name').value.trim();
    const amt=parseFloat(document.getElementById('sf-amount').value);
    const day=parseInt(document.getElementById('sf-day').value);
    const startYM=document.getElementById('sf-start-ym').value||thisYM;
    if(!name||!amt||!day){alert('すべての項目を入力してください');return;}
    const icons={'Netflix':'📺','Spotify':'🎵','家賃':'🏠','Disney+':'🏰','YouTube Premium':'▶️','Apple Music':'🎵','電気':'💡','ガス':'🔥','水道':'💧','Amazon Prime':'📦'};
    setSyncStatus('saving');
    await addDoc(collection(db,'subs'),{name,amount:amt,day,who:subWho,cat:subCat,icon:icons[name]||'🔄',tate:sfIsTate,startYM});
    document.getElementById('sf-name').value='';document.getElementById('sf-amount').value='';document.getElementById('sf-day').value='';document.getElementById('sf-start-ym').value='';
    sfIsTate=false;document.getElementById('sf-tate-toggle').classList.remove('on');document.getElementById('sf-tate-sub').textContent='オフ = 通常の半々割り勘';
    document.getElementById('sub-form').classList.remove('open');
  }

  async function delSub(id) {
    if(!confirm('このサブスクを削除しますか？'))return;
    setSyncStatus('saving');
    await deleteDoc(doc(db,'subs',id));
  }

  async function saveSubEdit() {
    const name=document.getElementById('se-name').value.trim();
    const amt=parseFloat(document.getElementById('se-amount').value);
    const day=parseInt(document.getElementById('se-day').value);
    const startYM=document.getElementById('se-start-ym').value||'';
    if(!name||!amt||!day){alert('すべての項目を入力してください');return;}
    const icons={'Netflix':'📺','Spotify':'🎵','家賃':'🏠','Disney+':'🏰','YouTube Premium':'▶️','Apple Music':'🎵','電気':'💡','ガス':'🔥','水道':'💧','Amazon Prime':'📦'};
    const s=subs.find(x=>x.id===editingSubId);
    setSyncStatus('saving');
    await updateDoc(doc(db,'subs',editingSubId),{name,amount:amt,day,who:seWho,cat:seCat,icon:icons[name]||s?.icon||'🔄',tate:seIsTate,startYM});
    closeModal('sub-edit-modal');
  }

  async function markSeisanDone(ym) {
    const updated={...seisanDone,[ym]:true};
    setSyncStatus('saving');
    await setDoc(doc(db,'meta','seisanDone'),updated);
  }
  async function unmarkSeisanDone(ym) {
    if(!confirm('精算完了を取り消しますか？'))return;
    const updated={...seisanDone};
    delete updated[ym];
    setSyncStatus('saving');
    await setDoc(doc(db,'meta','seisanDone'),updated);
  }

  // CSVダウンロード
  window.downloadCSV = function() {
    const headers = ['日付','説明','カテゴリ','金額','支払い者','立替'];
    const rows = expenses.map(e=>[e.date,e.desc,e.cat,e.amount,e.who==='nori'?'のり':'あよ',e.tate?'はい':'いいえ']);
    const csv = [headers,...rows].map(r=>r.join(',')).join('\n');
    const blob = new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
    const a = document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`nori-ayo-kakei-${thisYM}.csv`;
    a.click();
  };

  // --- 以下 UI ロジック（Firebaseと分離） ---
  function getSubExpensesForMonth(ym) {
    const [y,m]=ym.split('-').map(Number);
    return subs
      .filter(s=>!s.startYM||ym>=s.startYM)
      .map(s=>{const day=Math.min(s.day,new Date(y,m,0).getDate());return {id:'sub_'+s.id+'_'+ym,amount:s.amount,desc:s.name,cat:s.cat,date:`${ym}-${String(day).padStart(2,'0')}`,who:s.who,tate:!!s.tate,auto:true};});
  }
  function getExpensesForMonth(ym){return [...expenses.filter(e=>e.date.startsWith(ym)),...getSubExpensesForMonth(ym)].sort((a,b)=>b.date.localeCompare(a.date));}
  function calcBalance(ym){
    const list=getExpensesForMonth(ym);let noriPaid=0,ayoPaid=0,balance=0;
    list.forEach(e=>{if(e.who==='nori'){noriPaid+=e.amount;balance+=e.tate?e.amount:e.amount/2;}else{ayoPaid+=e.amount;balance-=e.tate?e.amount:e.amount/2;}});
    return {noriPaid,ayoPaid,balance,list};
  }

  window.toggleRecordForm=()=>document.getElementById('record-inline').classList.toggle('open');
  window.switchTab=function(t){
    document.querySelectorAll('.tab').forEach((b,i)=>{['dashboard','subs','seisan','history'].forEach((id,j)=>{if(i===j)b.classList.toggle('active',id===t);});});
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.getElementById('page-'+t).classList.add('active');
    if(t==='dashboard')renderDashboard();if(t==='subs')renderSubs();if(t==='seisan')renderSeisan();if(t==='history')renderHistory();
  };
  window.setMonth=function(m){
    if(m==='this')dashMonth=thisYM;else if(m==='last')dashMonth=lastYM;else{const v=document.getElementById('month-picker').value;if(!v)return;dashMonth=v;}
    document.getElementById('mt-this').classList.toggle('active',dashMonth===thisYM);
    document.getElementById('mt-last').classList.toggle('active',dashMonth===lastYM&&dashMonth!==thisYM);
    renderDashboard();
  };
  window.closeModal=id=>document.getElementById(id).classList.remove('open');
  window.closeModalOutside=(ev,id)=>{if(ev.target===document.getElementById(id))window.closeModal(id);};
  window.selectWho=w=>{selWho=w;document.getElementById('btn-nori').className='who-btn'+(w==='nori'?' nori-sel':'');document.getElementById('btn-ayo').className='who-btn'+(w==='ayo'?' ayo-sel':'');};
  window.buildCatGrid=()=>{document.getElementById('cat-grid').innerHTML=CATS.map(c=>`<button class="cat-btn${c.name===selCat?' selected':''}" onclick="selectCat('${c.name}')">${c.icon}<br>${c.name}</button>`).join('');};
  window.selectCat=n=>{selCat=n;window.buildCatGrid();};
  window.toggleTate=()=>{isTate=!isTate;document.getElementById('tate-toggle').classList.toggle('on',isTate);document.getElementById('tate-sub').textContent=isTate?'オン = 相手が全額返す':'オフ = 通常の半々割り勘';};
  window.mSelectWho=w=>{mWho=w;document.getElementById('m-btn-nori').className='who-btn'+(w==='nori'?' nori-sel':'');document.getElementById('m-btn-ayo').className='who-btn'+(w==='ayo'?' ayo-sel':'');};
  window.buildMCatGrid=()=>{document.getElementById('m-cat-grid').innerHTML=CATS.map(c=>`<button class="cat-btn${c.name===mCat?' selected':''}" onclick="mSelectCat('${c.name}')">${c.icon}<br>${c.name}</button>`).join('');};
  window.mSelectCat=n=>{mCat=n;window.buildMCatGrid();};
  window.mToggleTate=()=>{mIsTate=!mIsTate;document.getElementById('m-tate-toggle').classList.toggle('on',mIsTate);document.getElementById('m-tate-sub').textContent=mIsTate?'オン = 相手が全額返す':'オフ = 通常の半々割り勘';};
  window.openEdit=function(id){
    const e=expenses.find(x=>x.id===id);if(!e)return;
    editingId=id;mWho=e.who;mCat=e.cat;mIsTate=!!e.tate;
    document.getElementById('m-amount').value=e.amount;document.getElementById('m-desc').value=e.desc;document.getElementById('m-date').value=e.date;
    window.mSelectWho(e.who);window.buildMCatGrid();
    document.getElementById('m-tate-toggle').classList.toggle('on',mIsTate);document.getElementById('m-tate-sub').textContent=mIsTate?'オン = 相手が全額返す':'オフ = 通常の半々割り勘';
    document.getElementById('edit-modal').classList.add('open');
  };
  window.saveEdit=saveEdit;
  window.deleteExpense=deleteExpense;
  window.addExpense=addExpense;
  window.selectSubWho=w=>{subWho=w;document.getElementById('sbtn-nori').className='who-btn'+(w==='nori'?' nori-sel':'');document.getElementById('sbtn-ayo').className='who-btn'+(w==='ayo'?' ayo-sel':'');};
  window.buildSubCatGrid=()=>{document.getElementById('sub-cat-grid').innerHTML=CATS.map(c=>`<button class="cat-btn${c.name===subCat?' selected':''}" onclick="selectSubCat('${c.name}')">${c.icon}<br>${c.name}</button>`).join('');};
  window.selectSubCat=n=>{subCat=n;window.buildSubCatGrid();};
  window.sfToggleTate=()=>{sfIsTate=!sfIsTate;document.getElementById('sf-tate-toggle').classList.toggle('on',sfIsTate);document.getElementById('sf-tate-sub').textContent=sfIsTate?'オン = 相手が全額返す':'オフ = 通常の半々割り勘';};
  window.toggleSubForm=()=>{const f=document.getElementById('sub-form');f.classList.toggle('open');if(f.classList.contains('open')){window.selectSubWho('nori');window.buildSubCatGrid();}};
  window.addSub=addSub;
  window.delSub=delSub;
  window.seSelectWho=w=>{seWho=w;document.getElementById('se-btn-nori').className='who-btn'+(w==='nori'?' nori-sel':'');document.getElementById('se-btn-ayo').className='who-btn'+(w==='ayo'?' ayo-sel':'');};
  window.buildSeCatGrid=()=>{document.getElementById('se-cat-grid').innerHTML=CATS.map(c=>`<button class="cat-btn${c.name===seCat?' selected':''}" onclick="seSelectCat('${c.name}')">${c.icon}<br>${c.name}</button>`).join('');};
  window.seSelectCat=n=>{seCat=n;window.buildSeCatGrid();};
  window.seToggleTate=()=>{seIsTate=!seIsTate;document.getElementById('se-tate-toggle').classList.toggle('on',seIsTate);document.getElementById('se-tate-sub').textContent=seIsTate?'オン = 相手が全額返す':'オフ = 通常の半々割り勘';};
  window.openSubEdit=function(id){
    const s=subs.find(x=>x.id===id);if(!s)return;
    editingSubId=id;seWho=s.who;seCat=s.cat;seIsTate=!!s.tate;
    document.getElementById('se-name').value=s.name;document.getElementById('se-amount').value=s.amount;document.getElementById('se-day').value=s.day;document.getElementById('se-start-ym').value=s.startYM||'';
    window.seSelectWho(s.who);window.buildSeCatGrid();
    document.getElementById('se-tate-toggle').classList.toggle('on',seIsTate);document.getElementById('se-tate-sub').textContent=seIsTate?'オン = 相手が全額返す':'オフ = 通常の半々割り勘';
    document.getElementById('sub-edit-modal').classList.add('open');
  };
  window.saveSubEdit=saveSubEdit;
  window.markSeisanDone=markSeisanDone;
  window.unmarkSeisanDone=unmarkSeisanDone;
  window.setFilter=f=>{activeFilter=f;renderHistory();};

  function renderSubs(){
    const sl=document.getElementById('sub-list');
    if(!sl)return;
    sl.innerHTML=subs.length===0?'<div style="padding:16px;text-align:center;color:var(--ink3);font-size:12px">サブスクなし</div>':subs.map(s=>{
      const c=catObj(s.cat);const isNori=s.who==='nori';
      return `<div class="sub-item"><div class="sub-left"><div class="sub-icon-box">${s.icon}</div><div><div class="sub-name">${s.name}${s.tate?'<span class="tate-badge">立替</span>':''}</div><div class="sub-meta">毎月${s.day}日 · <span style="color:${isNori?'var(--nori)':'var(--ayo)'}">${isNori?'のり':'あよ'}</span> · <span style="color:${c.color}">${c.icon} ${s.cat}</span></div></div></div><div class="sub-right"><div class="sub-amount">${fmt(s.amount)}</div><button class="act-btn edit" onclick="openSubEdit('${s.id}')">編集</button><button class="act-btn del" onclick="delSub('${s.id}')">削除</button></div></div>`;
    }).join('');
    const total=subs.reduce((s,x)=>s+x.amount,0);
    const ss=document.getElementById('sub-summary');if(!ss)return;
    const warikanTotal=subs.filter(s=>!s.tate).reduce((s,x)=>s+x.amount,0);
    const tateTotal=subs.filter(s=>s.tate).reduce((s,x)=>s+x.amount,0);
    let summaryHTML=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)"><span style="color:var(--ink2)">月額合計</span><span style="font-family:'Syne',sans-serif;font-weight:700">${fmt(total)}</span></div>`;
    if(warikanTotal>0) summaryHTML+=`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:${tateTotal>0?'1px solid var(--border)':'none'}"><span style="color:var(--ink2)">ひとり当たり（割り勘分）</span><span style="font-family:'Syne',sans-serif;font-weight:700;color:var(--accent)">${fmt(warikanTotal/2)}</span></div>`;
    if(tateTotal>0) summaryHTML+=`<div style="display:flex;justify-content:space-between;padding:5px 0"><span style="color:var(--ink2)">立替合計（全額返済）</span><span style="font-family:'Syne',sans-serif;font-weight:700;color:var(--tate)">${fmt(tateTotal)}</span></div>`;
    ss.innerHTML=summaryHTML;
  }

  function renderSeisan(){
    const container=document.getElementById('seisan-content');if(!container)return;
    container.innerHTML='';
    const months=[];for(let i=0;i<6;i++){const d=new Date(now.getFullYear(),now.getMonth()-i,1);months.push(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`);}
    months.forEach(ym=>{
      const {noriPaid,ayoPaid,balance,list}=calcBalance(ym);if(list.length===0)return;
      const abs=Math.abs(balance);const done=!!seisanDone[ym];
      const halfByNori=list.filter(e=>e.who==='nori'&&!e.tate).reduce((s,e)=>s+e.amount,0);
      const halfByAyo=list.filter(e=>e.who==='ayo'&&!e.tate).reduce((s,e)=>s+e.amount,0);
      const tateByNori=list.filter(e=>e.who==='nori'&&e.tate).reduce((s,e)=>s+e.amount,0);
      const tateByAyo=list.filter(e=>e.who==='ayo'&&e.tate).reduce((s,e)=>s+e.amount,0);
      const netHalf=(halfByNori-halfByAyo)/2;const netTate=tateByNori-tateByAyo;
      let dirText='差額なし',dirColor='var(--accent)';
      if(abs>=1&&balance>0){dirText=`あよ → のり へ ${fmt(abs)}`;dirColor='var(--ayo)';}
      else if(abs>=1){dirText=`のり → あよ へ ${fmt(abs)}`;dirColor='var(--nori)';}
      const tateRows=list.filter(e=>e.tate).map(e=>{const other=e.who==='nori'?'あよ':'のり';const oc=e.who==='nori'?'var(--ayo)':'var(--nori)';return `<div class="seisan-row"><span class="seisan-row-label">${e.desc} <span class="tate-badge">立替</span></span><span class="seisan-row-val" style="color:${oc}">${other}が返す ${fmt(e.amount)}</span></div>`;}).join('');
      const block=document.createElement('div');
      block.className='seisan-block'+(done?' done':'');block.id='seisan-block-'+ym;
      block.innerHTML=`<div class="seisan-summary"><div><div style="font-size:10px;color:var(--ink3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px">${ym}</div><div class="seisan-who" style="color:${dirColor}">${dirText}</div></div>${done?'<span class="done-stamp">✓ 精算済み</span>':''}</div><div class="seisan-row"><span class="seisan-row-label">のり 支払い</span><span class="seisan-row-val" style="color:var(--nori)">${fmt(noriPaid)}</span></div><div class="seisan-row"><span class="seisan-row-label">あよ 支払い</span><span class="seisan-row-val" style="color:var(--ayo)">${fmt(ayoPaid)}</span></div><div class="seisan-row"><span class="seisan-row-label">割り勘の差額</span><span class="seisan-row-val">${netHalf>=0?'あよ→のり':'のり→あよ'} ${fmt(Math.abs(netHalf))}</span></div>${Math.abs(netTate)>0?`<div class="seisan-row"><span class="seisan-row-label">立替の返済</span><span class="seisan-row-val">${netTate>=0?'あよ→のり':'のり→あよ'} ${fmt(Math.abs(netTate))}</span></div>`:''}${tateRows}<button class="seisan-done-btn" id="seisan-btn-${ym}" onclick="markSeisanDone('${ym}')" ${done?'disabled':''}>${done?'精算完了済み':'精算完了にする'}</button>${done?`<button class="seisan-undo-btn" onclick="unmarkSeisanDone('${ym}')">✕ 取り消す</button>`:''}` ;
      container.appendChild(block);
    });
    if(!container.firstChild)container.innerHTML='<div style="padding:40px;text-align:center;color:var(--ink3);font-size:13px">データがありません</div>';
  }

  function renderDashboard(){
    const {noriPaid,ayoPaid,balance,list}=calcBalance(dashMonth);
    const total=list.reduce((s,e)=>s+e.amount,0);
    const [y,m]=dashMonth.split('-').map(Number);
    const pd=new Date(y,m-2,1);const prevYM=`${pd.getFullYear()}-${String(pd.getMonth()+1).padStart(2,'0')}`;
    const prevTotal=calcBalance(prevYM).list.reduce((s,e)=>s+e.amount,0);
    const diffPct=prevTotal>0?Math.round((total-prevTotal)/prevTotal*100):null;
    document.getElementById('kpi-total').textContent=fmt(total);
    const de=document.getElementById('kpi-diff');
    if(diffPct!==null){de.textContent=(diffPct>=0?'▲':'▼')+Math.abs(diffPct)+'% 前月比';de.style.color=diffPct>=0?'var(--red)':'var(--accent)';}else de.textContent='';
    document.getElementById('kpi-nori').textContent=fmt(noriPaid);document.getElementById('kpi-ayo').textContent=fmt(ayoPaid);
    const noriShare=list.filter(e=>e.who==='nori'&&!e.tate).reduce((s,e)=>s+e.amount/2,0)+list.filter(e=>e.who==='ayo'&&e.tate).reduce((s,e)=>s+e.amount,0)+list.filter(e=>e.who==='ayo'&&!e.tate).reduce((s,e)=>s+e.amount/2,0);
    const ayoShare=list.filter(e=>e.who==='ayo'&&!e.tate).reduce((s,e)=>s+e.amount/2,0)+list.filter(e=>e.who==='nori'&&e.tate).reduce((s,e)=>s+e.amount,0)+list.filter(e=>e.who==='nori'&&!e.tate).reduce((s,e)=>s+e.amount/2,0);
    document.getElementById('kpi-nori-sub').textContent='負担 '+fmt(noriShare);document.getElementById('kpi-ayo-sub').textContent='負担 '+fmt(ayoShare);
    const sb=document.getElementById('settle-banner');const abs=Math.abs(balance);
    if(abs<1)sb.innerHTML=`<div class="settle-banner even"><span class="settle-text" style="color:var(--accent)">✓ 差額なし</span></div>`;
    else if(balance>0)sb.innerHTML=`<div class="settle-banner ayo-pays"><div><div class="settle-text" style="color:var(--ayo)">あよ → のり へ支払い</div><div style="font-size:10px;color:var(--ink2);margin-top:2px">${dashMonth}の精算額</div></div><div class="settle-amt" style="color:var(--ayo)">${fmt(abs)}</div></div>`;
    else sb.innerHTML=`<div class="settle-banner nori-pays"><div><div class="settle-text" style="color:var(--nori)">のり → あよ へ支払い</div><div style="font-size:10px;color:var(--ink2);margin-top:2px">${dashMonth}の精算額</div></div><div class="settle-amt" style="color:var(--nori)">${fmt(abs)}</div></div>`;
    const bycat={};list.forEach(e=>bycat[e.cat]=(bycat[e.cat]||0)+e.amount);
    const labels=Object.keys(bycat),data=Object.values(bycat),colors=labels.map(l=>catObj(l).color);
    if(catChart)catChart.destroy();
    catChart=new Chart(document.getElementById('chart-cat'),{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,hoverOffset:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:9},padding:5,boxWidth:7}}}}});
    if(whoChart)whoChart.destroy();
    whoChart=new Chart(document.getElementById('chart-who'),{type:'bar',data:{labels:['支払い','負担'],datasets:[{label:'のり',data:[noriPaid,noriShare],backgroundColor:'#3A563588',borderRadius:4},{label:'あよ',data:[ayoPaid,ayoShare],backgroundColor:'#D57B0E88',borderRadius:4}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:9},padding:5,boxWidth:7}}},scales:{x:{ticks:{font:{size:9}},grid:{display:false}},y:{ticks:{font:{size:9},callback:v=>v>=1000?'¥'+(v/1000).toFixed(0)+'k':'¥'+v},grid:{color:'rgba(0,0,0,.04)'}}}}});
    const rl=document.getElementById('recent-list');
    rl.innerHTML=list.map(e=>{
      const c=catObj(e.cat);const isNori=e.who==='nori';
      const actions=e.auto?'<span class="auto-badge">自動</span>':`<div class="tx-actions"><button class="act-btn edit" onclick="openEdit('${e.id}')">編集</button><button class="act-btn del" onclick="deleteExpense('${e.id}')">削除</button></div>`;
      return `<div class="tx-item"><div class="tx-left"><div class="tx-icon" style="background:${c.color}22">${c.icon}</div><div class="tx-info"><div class="tx-name">${e.desc}${e.tate?'<span class="tate-badge">立替</span>':''}${e.auto?'<span class="auto-badge">自動</span>':''}</div><div class="tx-meta">${e.date} · ${e.cat}</div></div></div><div class="tx-right"><div><div class="tx-amount">${fmt(e.amount)}</div><div style="text-align:right"><span class="who-badge" style="background:${isNori?'var(--nori2)':'var(--ayo2)'};color:${isNori?'var(--nori)':'var(--ayo)'}">${isNori?'のり':'あよ'}</span></div></div>${actions}</div></div>`;
    }).join('')||'<div style="padding:20px;text-align:center;color:var(--ink3);font-size:12px">データなし</div>';
  }

  function renderHistory(){
    const filters=['すべて','のり','あよ','自動','立替',...CATS.map(c=>c.name)];
    document.getElementById('filter-bar').innerHTML=filters.map(f=>`<button class="filter-btn${f===activeFilter?' active':''}" onclick="setFilter('${f}')">${f}</button>`).join('');
    const allExp=[...expenses,...getSubExpensesForMonth(thisYM),...(thisYM!==lastYM?getSubExpensesForMonth(lastYM):[])].sort((a,b)=>b.date.localeCompare(a.date));
    let list=allExp;
    if(activeFilter==='のり')list=allExp.filter(e=>e.who==='nori');
    else if(activeFilter==='あよ')list=allExp.filter(e=>e.who==='ayo');
    else if(activeFilter==='自動')list=allExp.filter(e=>e.auto);
    else if(activeFilter==='立替')list=allExp.filter(e=>e.tate);
    else if(activeFilter!=='すべて')list=allExp.filter(e=>e.cat===activeFilter);
    document.getElementById('hist-body').innerHTML=list.map(e=>{
      const isNori=e.who==='nori';
      return `<div class="hist-row"><span style="color:var(--ink)">${e.desc}${e.auto?'<span class="auto-badge">自動</span>':''}${e.tate?'<span class="tate-badge">立替</span>':''}</span><span><span class="badge" style="background:${isNori?'var(--nori2)':'var(--ayo2)'};color:${isNori?'var(--nori)':'var(--ayo)'}">${isNori?'のり':'あよ'}</span></span><span style="color:var(--ink3)">${e.date.slice(5)}</span><span style="text-align:right;font-family:'Syne',sans-serif;font-weight:700;color:var(--red)">${fmt(e.amount)}${!e.auto?`<button class="del-btn" onclick="deleteExpense('${e.id}');renderHistory()">✕</button>`:''}</span></div>`;
    }).join('')||'<div style="padding:18px;text-align:center;color:var(--ink3)">データなし</div>';
    window.renderHistory=renderHistory;
  }

  // 初期化
  document.getElementById('f-date').value=now.toISOString().split('T')[0];
  document.getElementById('month-picker').value=thisYM;
  window.selectWho('nori');
  window.buildCatGrid();
</script>
</body>
</html>
